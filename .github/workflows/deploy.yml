# .github/workflows/deploy.yml
# On every push to `main`, SSHes into Toolforge and triggers
# `toolforge build start` to rebuild the container image from GitHub.
#
# Required GitHub repository secrets:
#   TOOLFORGE_SSH_PRIVATE_KEY  – private key whose public half is in
#                                ~/.ssh/authorized_keys on Toolforge
#   TOOLFORGE_TOOL_NAME        – Toolforge tool account name (e.g. "pid-bangladesh")
#   GITHUB_REPO_URL            – Full HTTPS URL of this repo
#                                (e.g. "https://github.com/you/pid-bot")

name: Deploy to Toolforge (Build Service)

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    name: toolforge build start
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout (keeps the workflow file itself fresh) ─────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Inject SSH private key ──────────────────────────────────────────
      - name: Set up SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.TOOLFORGE_SSH_PRIVATE_KEY }}

      # ── 3. Trust Toolforge bastion ─────────────────────────────────────────
      - name: Add Toolforge bastion to known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H login.toolforge.org >> ~/.ssh/known_hosts 2>/dev/null
          chmod 600 ~/.ssh/known_hosts

      # ── 4. Trigger toolforge build start ──────────────────────────────────
      # This rebuilds the container image from the latest commit on GitHub.
      # The build runs asynchronously on Toolforge's build cluster.
      - name: Trigger build on Toolforge
        env:
          TOOL_NAME: ${{ secrets.TOOLFORGE_TOOL_NAME }}
          REPO_URL:  ${{ secrets.GITHUB_REPO_URL }}
        run: |
          ssh -o StrictHostKeyChecking=yes \
              "${TOOL_NAME}@login.toolforge.org" \
              "toolforge build start ${REPO_URL}"

      # ── 5. Summary ─────────────────────────────────────────────────────────
      - name: Deployment triggered
        run: |
          echo "✅ Build started on Toolforge."
          echo "   Monitor with: toolforge build show"
          echo "   Once complete, the next job run will use the new image."
