# job.yaml – Toolforge Kubernetes job definition using the Build Service image
#
# Load with:    toolforge jobs load toolforge/job.yaml
# Run once:     toolforge jobs run pid-bot
# Check logs:   toolforge jobs logs pid-bot -f
#
# IMPORTANT: Replace <YOUR-TOOL-NAME> with your actual Toolforge tool name
#            (e.g. "pid-bangladesh"). The image name follows the pattern:
#            tool-<toolname>/<toolname>:latest

name: pid-bot
# "run-bot" maps to the Procfile entry: run-bot: python main.py
command: run-bot
image: tool-pid-bangladesh/pid-bangladesh:latest   # ← change to your tool name
continuous: true
mem: 2Gi
cpu: 1
mount: all         # needed to access $TOOL_DATA_DIR (credential files on NFS)
filelog: true      # write stdout/stderr to ~/logs/
emails: onfinish
